<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Future Sports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="scene">

    <header>
      <h1>ECO FUTURE SPORTS</h1>
      <p>Saúde • Tecnologia • Natureza • Inovação</p>
    </header>

    <!-- Cidade futurista -->
    <div class="city"></div>

    <!-- Árvores -->
    <div class="trees">
      <div class="tree"></div>
      <div class="tree"></div>
      <div class="tree"></div>
      <div class="tree"></div>
    </div>

    <!-- Atletas -->
    <div class="athletes">

      <div class="athlete running">
        🏃
      </div>

      <div class="athlete cycling">
        🚴
      </div>

      <div class="athlete basketball">
        ⛹️
      </div>

    </div>

    <!-- Alimentos -->
    <div class="foods">
      <span class="food apple">🍎</span>
      <span class="food avocado">🥑</span>
      <span class="food carrot">🥕</span>
      <span class="food orange">🍊</span>
    </div>

    <!-- Drones -->
    <div class="drone drone1"></div>
    <div class="drone drone2"></div>

    <!-- Hologramas -->
    <div class="hologram holo1"></div>
    <div class="hologram holo2"></div>

    <!-- IA -->
    <div class="ai-core">
      <div class="pulse"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
