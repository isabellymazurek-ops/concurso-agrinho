<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neo Eco Game World</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<div class="world">

  <div class="hud">⚡ ENERGY: 98% | 🏃 MISSÕES: 3 | 🌱 ECO LEVEL MAX</div>

  <div class="city"></div>
  <div class="track"></div>

  <!-- árvores -->
  <div class="tree" style="left:10%"></div>
  <div class="tree" style="left:30%"></div>
  <div class="tree" style="left:70%"></div>

  <!-- jogadores -->
  <div class="player" style="left:20%; bottom:140px;">🏃</div>
  <div class="player" style="left:50%; bottom:140px;">🚴</div>
  <div class="player" style="left:75%; bottom:140px;">🧗</div>

  <!-- comida power-up -->
  <div class="food" style="top:30%; left:20%;">🍎</div>
  <div class="food" style="top:20%; right:25%;">🥑</div>
  <div class="food" style="top:35%; right:10%;">🍊</div>

  <!-- drones -->
  <div class="drone" style="top:15%; left:10%"></div>
  <div class="drone" style="top:25%; right:10%"></div>

  <!-- robôs -->
  <div class="robot" style="bottom:220px; left:15%"></div>
  <div class="robot" style="bottom:260px; right:20%"></div>

  <!-- hologramas -->
  <div class="holo" style="top:15%; left:40%"></div>
  <div class="holo" style="top:40%; right:15%"></div>

  <!-- núcleo de energia -->
  <div class="orb"></div>

</div>

<script src="script.js"></script>

</body>
</html>
